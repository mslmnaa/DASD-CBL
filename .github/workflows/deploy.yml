name: Deploy to VPS

# Continuous Deployment: setiap push ke branch main akan otomatis
# men-deploy aplikasi ke VPS (git pull + install dependensi + restart Gunicorn).
# Dapat juga dipicu manual lewat tab Actions (workflow_dispatch).

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e
            cd /var/www/usdidr
            git pull origin main
            venv/bin/pip install -r requirements.txt
            sudo systemctl restart usdidr
